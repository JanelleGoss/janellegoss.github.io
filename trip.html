<!DOCTYPE html>
<html>

<head>
    <title>Trips</title>

    <style>
        body {
            margin: 0;
            background: #111;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .carousel {
            position: relative;
            width: 600px;
            height: 400px;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .5);
        }

        .buttons {
            position: absolute;
            width: 100%;
            top: 45%;
            display: flex;
            justify-content: space-between;
        }

        button {
            background: rgba(0, 0, 0, .5);
            border: none;
            color: white;
            font-size: 30px;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            background: rgba(0, 0, 0, .8);
        }
    </style>
</head>

<body>

    <div class="carousel">

        <div class="track" id="track">

            <div class="slide"><img src="/Trip/AustriaBandConcert.jpg"></div>
            <div class="slide"><img src="/Trip/AndreaBlowsNose.jpg"></div>
            <div class="slide"><img src="/Trip/CransMontanaMe.jpg"></div>
            <div class="slide"><img src="/Trip/LondonTowerBridgeMeandIsa.jpg"></div>
            <div class="slide"><img src="/Trip/MeandIsaSwitzLake.jpg"></div>
            <div class="slide"><img src="/Trip/MeandIsaThames.jpg"></div>
            <div class="slide"><img src="images/photo5.jpg"></div>

        </div>

        <div class="buttons">
            <button onclick="move(-1)">❮</button>
            <button onclick="move(1)">❯</button>
        </div>

    </div>

    <script>

        let current = 0;
        const slides = document.querySelectorAll(".slide");

        function shuffleSlides() {
            const parent = document.querySelector(".track");
            const slideArray = Array.from(slides);
            slideArray.sort(() => Math.random() - 0.5);
            slideArray.forEach(slide => parent.appendChild(slide));
        }

        shuffleSlides();

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove("active"));
            slides[index].classList.add("active");
        }

        function move(direction) {
            current += direction;
            if (current >= slides.length) current = 0;
            if (current < 0) current = slides.length - 1;
            showSlide(current);
        }

        showSlide(0);

        setInterval(() => {
            move(1);
        }, 1000);

    </script>

</body>

</html>
