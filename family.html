<!DOCTYPE html>
<html>

    <style>
        body {
            margin: 0;
            background: #111;
            font-family: Arial;
        }

        .carousel {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .track {
            display: flex;
            transition: transform 0.5s ease;
        }

        .slide {
            min-width: 300px;
            margin: 20px;
        }

        .slide img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .5);
        }

        .buttons {
            position: absolute;
            width: 100%;
            top: 45%;
            display: flex;
            justify-content: space-between;
        }

        button {
            background: rgba(0, 0, 0, .5);
            border: none;
            color: white;
            font-size: 30px;
            padding: 10px 20px;
            cursor: pointer;
        }

        button:hover {
            background: rgba(0, 0, 0, .8);
        }
    </style>
</head>
