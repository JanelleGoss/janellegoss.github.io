<!DOCTYPE html>
<html>

<head>
    <title>Trips</title>

    <style>
        body {
            margin: 0;
            background: #111;
            font-family: Arial;
        }

        .carousel {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .track {
            display: flex;
            transition: transform 0.5s ease;
        }

        .slide {
            min-width: 300px;
            margin: 20px;
        }

        .slide img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .5);
        }

        .buttons {
            position: absolute;
            width: 100%;
            top: 45%;
            display: flex;
            justify-content: space-between;
        }

        button {
            background: rgba(0, 0, 0, .5);
            border: none;
            color: white;
            font-size: 30px;
            padding: 10px 20px;
            cursor: pointer;
        }

        button:hover {
            background: rgba(0, 0, 0, .8);
        }
    </style>
</head>

<body>

    <div class="carousel">

        <div class="track" id="track">

            <div class="slide"><img src="/Trip/AustriaBandConcert.jpg"></div>
            <div class="slide"><img src="/Trip/AndreaBlowsNose.jpg"></div>
            <div class="slide"><img src="/Trip/CransMontanaMe.jpg"></div>
            <div class="slide"><img src="/Trip/LondonTowerBridgeMeandIsa.jpg"></div>
            <div class="slide"><img src="/Trip/MeandIsaSwitzLake.jpg"></div>
            <div class="slide"><img src="/Trip/MeandIsaThames.jpg"></div>
            <div class="slide"><img src="images/photo5.jpg"></div>

        </div>

        <div class="buttons">
            <button onclick="move(-1)">❮</button>
            <button onclick="move(1)">❯</button>
        </div>

    </div>

    <script>

        let position = 0;
        const track = document.getElementById("track");
        const slides = document.querySelectorAll(".slide");
        const slideWidth = 340;
        const maxPosition = -(slides.length - 1) * slideWidth; // how far left we can go

        function move(direction) {
            position += direction * slideWidth; // move left or right

            if (position > 0) {
                position = maxPosition; // if we go too far right, jump to the end
            }
            if (position < maxPosition) {
                position = 0; // if we go too far left, jump back to the start
            }

            track.style.transform = `translateX(${position}px)`;
        }

        setInterval(() => {
            move(-1);
        }, 1000);

    </script>

</body>

</html>
